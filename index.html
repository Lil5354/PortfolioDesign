<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Prototype</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      body { margin: 0; padding: 0; }
      /* Nuke Google Translate UI */
      .goog-te-banner-frame.skiptranslate, .goog-te-banner-frame { display: none !important; }
      body { top: 0px !important; position: static !important; }
      #google_translate_element { display: none !important; }
      .goog-tooltip { display: none !important; }
      .goog-tooltip:hover { display: none !important; }
      .goog-text-highlight { background-color: transparent !important; border: none !important; box-shadow: none !important; }
      div#goog-gt-tt { display: none !important; }
      .goog-te-balloon-frame { display: none !important; }
      .skiptranslate iframe { display: none !important; }
    </style>
  </head>
  <body>
    <script>
      // Global fix for React crashing with Google Translate
      if (typeof Node === 'function' && Node.prototype) {
        const originalRemoveChild = Node.prototype.removeChild;
        Node.prototype.removeChild = function(child) {
          if (child.parentNode !== this) {
            if (console) console.warn('Cannot remove a child from a different parent', child, this);
            return child;
          }
          return originalRemoveChild.apply(this, arguments);
        };
        const originalInsertBefore = Node.prototype.insertBefore;
        Node.prototype.insertBefore = function(newNode, referenceNode) {
          if (referenceNode && referenceNode.parentNode !== this) {
            if (console) console.warn('Cannot insert before a reference node from a different parent', referenceNode, this);
            return newNode;
          }
          return originalInsertBefore.apply(this, arguments);
        };
      }
    </script>
    <div id="google_translate_element"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'vi',
          includedLanguages: 'vi,en',
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
